name: Deploy Project
on: [push]
jobs:
    lint:
      runs-on: ubuntu-latest
      steps:
        - name: get code
          uses: actions/checkout@v3
        - name: install nodejs
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - name: install dependencies
          run: npm ci
        - name: lint step
          run: npm lint
    test:
      needs: lint
      runs-on: ubuntu-latest
      steps:
        - name: Get code
          uses: actions/checkout@v3 # used when need to use any ready to use action
        - name: Install NodeJS
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - name: Install dependencies
          run: npm ci
        - name: tests step
          run: npm test
    deploy:
      needs: test # Waits for other job to finish so it can proceed with deployment
      runs-on: ubuntu-latest
      steps:
        - name: Get code
          uses: actions/checkout@v3
        - name: Install NodeJS
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - name: Install dependencies
          run: npm ci
        - name: Build project
          run: npm run build
        - name: deploy step
          run: npm build